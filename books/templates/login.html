{% extends "base.html" %}

{% block title %}Login - Northshore Books{% endblock %}

{% block content %}

<div class="container mx-auto mt-4 flex flex-1 justify-center items-center">
    <div class="card bg-base-100 w-96 shadow-sm rounded-2xl text-white py-4">
        <div class="card-body">
            <h2 class="card-title text-2xl">Welcome Back</h2>
            <p class="text-gray-300">Login to access your account.</p>

            <fieldset class="fieldset text-white mt-4">
                <label class="label">Email</label>
                <input type="email" id="login-email" class="input w-full" placeholder="Email" />

                <label class="label">Password</label>
                <input type="password" id="login-password" class="input w-full" placeholder="Password" />

                <button class="btn btn-primary mt-4" onclick="handleLogin()">Login</button>
            </fieldset>

            <p class="text-center text-gray-300 mt-4">
                Don't have an account?
                <a href="{% url 'register' %}" class="text-primary font-semibold hover:underline">Register here</a>
            </p>
        </div>
    </div>
</div>

<!-- Add JavaScript to handle login -->
<script>
  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    const response = await fetch("{% url 'login' %}", {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email, password })
    });

    if (response.ok) {
      window.location.href = "{% url 'home' %}";
      return;
    }

    const message = await response.text();
    console.error('Login failed:', message);
  }
</script>

{% endblock %}
